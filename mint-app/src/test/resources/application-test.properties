spring.datasource.url=${TEST_DB_URL:jdbc:postgresql://localhost:5433/mint_test}
# Defaults align with docker-compose Postgres (mint/mint); override via env if needed.
spring.datasource.username=${TEST_DB_USERNAME:mint}
spring.datasource.password=${TEST_DB_PASSWORD:mint}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Avoid auto-replacing with in-memory DB during tests
spring.test.database.replace=none

