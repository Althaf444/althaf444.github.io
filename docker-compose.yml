services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mint
      POSTGRES_USER: mint
      POSTGRES_PASSWORD: mint
    # Host 5433 avoids clashing with a local PostgreSQL install on 5432
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/01-init-test-db.sql:/docker-entrypoint-initdb.d/01-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mint -d mint"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mint
      SPRING_DATASOURCE_USERNAME: mint
      SPRING_DATASOURCE_PASSWORD: mint
    ports:
      - "8080:8080"

volumes:
  postgres_data:
