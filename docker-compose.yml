version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: mint-postgres
    restart: always
    environment:
      POSTGRES_USER: mint_user
      POSTGRES_PASSWORD: mint_password
      POSTGRES_DB: mint_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
